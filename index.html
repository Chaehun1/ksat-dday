            { name: '10월 서바이벌 프로', date: '2026-10-09', displayDate: '2026년 10월 9일 (금)', category: 'surf' },
            { name: '10월 더 프리미엄', date: '2026-10-15', displayDate: '2026년 10월 15일 (목)', category: 'duff' },
            { name: '10월 모의고사', date: '2026-10-20', displayDate: '2026년 10월 20일 (화)', category: 'gyoyukchung', grades: '고1, 고2, 고3' },
            { name: '11월 더 프리미엄', date: '2026-11-02', displayDate: '2026년 11월 2일 (월)', category: 'duff' },
            { name: '11월 서바이벌 프로', date: '2026-11-02', displayDate: '2026년 11월 2일 (월)', category: 'surf' },
            { name: '2027학년도 수능', date: '2026-11-19', displayDate: '2026년 11월 19일 (목)', category: 'suneung', isSuneung: true },
            { name: '수능 성적 통지일', date: '2026-12-11', displayDate: '2026년 12월 11일 (금)', category: 'etc' },
            { name: '정시 원서 접수 시작', date: '2027-01-04', displayDate: '2027년 1월 4일 (월)', category: 'etc' },
            { name: '2028학년도 수능', date: '2027-11-18', displayDate: '2027년 11월 18일 (목)', category: 'suneung', isSuneung: true }
        ];

        var activeFilters = [];
        var showPast = false;

        function getToday() { var d = new Date(); d.setHours(0,0,0,0); return d; }
        function parseDate(s) { var d = new Date(s + 'T00:00:00'); d.setHours(0,0,0,0); return d; }
        function calculateDday(s) { return Math.ceil((parseDate(s) - getToday()) / 86400000); }

        function getBadge(cat) {
            var m = { suneung:['수능','badge-suneung'], pyeongwon:['평가원','badge-pyeongwon'], gyoyukchung:['교육청','badge-gyoyukchung'], duff:['더프','badge-duff'], surf:['서프','badge-surf'], etc:['기타','badge-etc'] };
            var i = m[cat];
            return i ? '<span class="badge '+i[1]+'">'+i[0]+'</span>' : '';
        }

        function saveFilters() { try { localStorage.setItem('suneung-filters', JSON.stringify(activeFilters)); } catch(e){} }
        function savePastState() { try { localStorage.setItem('suneung-show-past', JSON.stringify(showPast)); } catch(e){} }
        function saveMode() { try { localStorage.setItem('suneung-mode', currentMode); } catch(e){} }

        function loadSavedState() {
            try {
                var sf = localStorage.getItem('suneung-filters');
                if (sf) { activeFilters = JSON.parse(sf); activeFilters.forEach(function(f){ var b=document.getElementById('btn-'+f); if(b) b.classList.add('active'); }); }
                var sp = localStorage.getItem('suneung-show-past');
                if (sp) { showPast = JSON.parse(sp); if(showPast) document.getElementById('pastToggle').classList.add('active'); }
                var sm = localStorage.getItem('suneung-mode');
                if (sm && (sm === 'suneung' || sm === '6mo')) currentMode = sm;
            } catch(e){}
        }

        function loadRandomTheme() {
            var themes = ['coral','lavender','sage','rose','marigold'];
            currentTheme = 'theme-' + themes[Math.floor(Math.random()*themes.length)];
        }

        function applyTheme() {
            var box = document.getElementById('mainDdayBox');
            box.className = 'main-dday ' + (currentMode === '6mo' ? 'theme-6mo' : currentTheme);
        }

        function switchMode(mode) {
            if (currentMode === mode) return;
            currentMode = mode;
            saveMode();

            document.getElementById('tab-suneung').classList.toggle('active', mode === 'suneung');
            document.getElementById('tab-6mo').classList.toggle('active', mode === '6mo');

            // 숫자 flip 애니메이션
            var numEl = document.getElementById('mainDday');
            numEl.classList.remove('animating');
            void numEl.offsetWidth;
            numEl.classList.add('animating');

            var fill = document.getElementById('progressFill');
            var pctEl = document.getElementById('progressPercent');
            if (mode === '6mo') {
                fill.classList.add('mode-6mo');
                pctEl.style.color = '#11998e';
            } else {
                fill.classList.remove('mode-6mo');
                pctEl.style.color = '';
            }

            applyTheme();
            updateDday();
        }

        function displayRandomHandwriting() {
            var item = handwritingTexts[Math.floor(Math.random()*handwritingTexts.length)];
            var el = document.getElementById('handwriting');
            var srcEl = document.getElementById('handwritingSrc');
            if (el) el.textContent = item.text;
            if (srcEl) srcEl.textContent = item.src ? '— ' + item.src : '';
        }

        function toggleFilter(filter) {
            var btn = document.getElementById('btn-'+filter);
            var idx = activeFilters.indexOf(filter);
            if (idx > -1) { activeFilters.splice(idx,1); btn.classList.remove('active'); }
            else { activeFilters.push(filter); btn.classList.add('active'); }
            saveFilters(); renderSchedule();
        }

        function togglePast() {
            showPast = !showPast;
            document.getElementById('pastToggle').classList.toggle('active', showPast);
            savePastState(); renderSchedule();
        }

        function updateDday() {
            var cfg = DATES[currentMode];
            var dday = calculateDday(cfg.target);

            document.getElementById('mainDdayLabel').textContent = cfg.label;
            document.getElementById('mainDdayDate').textContent = cfg.dateText;
            document.getElementById('progressLabel').textContent = cfg.progressLabelText;
            document.getElementById('progressDateStart').textContent = cfg.progressStartText;
            document.getElementById('progressDateEnd').textContent = cfg.progressEndText;

            var el = document.getElementById('mainDday');
            if (dday > 0) el.textContent = 'D-'+dday;
            else if (dday === 0) el.textContent = 'D-Day!';
            else el.textContent = 'D+'+Math.abs(dday);

            document.getElementById('daysLeft').textContent = dday > 0 ? dday+'일' : '0일';
            document.getElementById('weeksLeft').textContent = Math.max(0, Math.floor(dday/7))+'주';
            document.getElementById('monthsLeft').textContent = Math.max(0, Math.floor(dday/30))+'개월';

            var start = parseDate(cfg.progressStart), end = parseDate(cfg.target), today = getToday();
            var pct = Math.min(100, Math.max(0, ((today - start) / (end - start)) * 100));
            document.getElementById('progressPercent').textContent = pct.toFixed(1) + '%';
            document.getElementById('progressFill').style.width = pct + '%';
        }

        function renderSchedule() {
            var list = document.getElementById('scheduleList');
            list.innerHTML = '';

            if (activeFilters.length === 0) {
                list.innerHTML = '<div class="empty-message"><span class="empty-icon">📋</span>위 버튼을 눌러 모의고사를 선택하세요</div>';
                return;
            }

            var items = [];
            schedules.forEach(function(s) {
                var shouldShow = false, displayName = s.name, grades = '', badgeCat = s.category;
                if (s.category === 'both') {
                    var hp = activeFilters.indexOf('pyeongwon') > -1, hg = activeFilters.indexOf('gyoyukchung') > -1;
                    if (hp && hg) { shouldShow=true; grades='고1, 고2, 고3'; badgeCat='pyeongwon'; }
                    else if (hp) { shouldShow=true; grades='고3'; badgeCat='pyeongwon'; }
                    else if (hg) { shouldShow=true; grades='고1, 고2'; badgeCat='gyoyukchung'; }
                } else if (activeFilters.indexOf(s.category) > -1) {
                    shouldShow = true;
                    if (s.grades) grades = s.grades;
                }
                if (shouldShow) items.push({ name:s.name, date:s.date, displayDate:s.displayDate, category:s.category, isSuneung:s.isSuneung, displayName: grades ? displayName+' ('+grades+')' : displayName, badgeCat: badgeCat });
            });

            if (!showPast) items = items.filter(function(i){ return parseDate(i.date) >= getToday(); });

            if (items.length === 0) {
                list.innerHTML = '<div class="empty-message"><span class="empty-icon">🔍</span>선택한 조건에 맞는 일정이 없습니다</div>';
                return;
            }

            items.forEach(function(item, idx) {
                var dday = calculateDday(item.date);
                var isPast = dday < 0, isToday = dday === 0, isUpcoming = dday > 0 && dday <= 7;
                var isSuneung = item.isSuneung && item.date === '2026-11-19';

                var el = document.createElement('div');
                el.className = 'schedule-item';
                if (isSuneung) el.classList.add('is-suneung');
                else if (isUpcoming) el.classList.add('upcoming');
                if (isPast) el.classList.add('past-item');
                el.style.animationDelay = (idx * 0.03) + 's';

                var ddayText, ddayClass;
                if (isToday) { ddayText='D-Day!'; ddayClass='today'; }
                else if (isPast) { ddayText='D+'+Math.abs(dday); ddayClass='past'; }
                else { ddayText='D-'+dday; ddayClass='future'; }

                var bc = item.badgeCat === 'both' ? 'pyeongwon' : item.badgeCat;
                el.innerHTML = '<div class="schedule-info"><div class="schedule-name">'+item.displayName+getBadge(bc)+'</div><div class="schedule-date">'+item.displayDate+'</div></div><div class="schedule-dday '+ddayClass+'">'+ddayText+'</div>';
                list.appendChild(el);
            });
        }

        function updateFooter() {
            var now = new Date();
            document.getElementById('updateTime').textContent = '마지막 업데이트: ' + now.toLocaleString('ko-KR');
            var midnight = new Date(now);
            midnight.setDate(midnight.getDate()+1);
            midnight.setHours(0,0,0,0);
            var diff = midnight - now;
            document.getElementById('nextUpdate').textContent = '자동 갱신까지 '+Math.floor(diff/3600000)+'시간 '+Math.floor((diff%3600000)/60000)+'분';
        }

        function scheduleMidnightRefresh() {
            var now = new Date(), midnight = new Date(now);
            midnight.setDate(midnight.getDate()+1);
            midnight.setHours(0,0,0,0);
            setTimeout(function(){ updateAll(); scheduleMidnightRefresh(); }, midnight - now + 1000);
        }

        function updateAll() { updateDday(); renderSchedule(); updateFooter(); }

        // 초기화
        displayRandomHandwriting();
        loadRandomTheme();
        loadSavedState();

        if (currentMode === '6mo') {
            document.getElementById('tab-suneung').classList.remove('active');
            document.getElementById('tab-6mo').classList.add('active');
            document.getElementById('progressFill').classList.add('mode-6mo');
            document.getElementById('progressPercent').style.color = '#11998e';
        }

        applyTheme();
        updateAll();
        scheduleMidnightRefresh();
        setInterval(updateFooter, 60000);
    </script>
</body>
</html>
