    <style>
        .container { max-width: 1100px; margin: 0 auto; }

        .page-header {
            background: rgba(255,255,255,0.95);
            border-radius: 22px;
            padding: 26px 32px;
            margin-bottom: 18px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.12);
            backdrop-filter: blur(8px);
        }
        .page-title {
            font-size: 1.6em;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .page-subtitle {
            margin-top: 6px;
            font-size: 0.92em;
            color: #777;
        }
        .draft-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(229,57,53,0.12);
            color: #c0392b;
            border: 1px solid rgba(229,57,53,0.3);
            border-radius: 999px;
            padding: 3px 10px;
            font-size: 0.72em;
            font-weight: 600;
            margin-left: 8px;
            vertical-align: middle;
        }
        html[data-theme="dark"] .page-header { background: rgba(30,32,48,0.92); }
        html[data-theme="dark"] .page-title  { color: #e8e8ea; }
        html[data-theme="dark"] .page-subtitle { color: #9a9aaa; }
        html[data-theme="dark"] .draft-badge { background: rgba(229,57,53,0.18); color: #ff8a8a; border-color: rgba(229,57,53,0.35); }

        /* ── 필터 바 ── */
        .filter-bar {
            background: rgba(255,255,255,0.95);
            border-radius: 18px;
            padding: 16px 20px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            backdrop-filter: blur(8px);
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-label {
            font-size: 0.82em;
            color: #666;
            font-weight: 600;
        }
        .filter-select {
            padding: 7px 12px;
            border: 1px solid #d0d4e0;
            border-radius: 10px;
            background: #fff;
            color: #333;
            font-family: 'IBM Plex Sans KR', sans-serif;
            font-size: 0.86em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-select:hover { border-color: #667eea; }
        .filter-select:focus-visible { outline: 2px solid #667eea; outline-offset: 1px; }
        html[data-theme="dark"] .filter-bar    { background: rgba(30,32,48,0.92); }
        html[data-theme="dark"] .filter-label  { color: #9a9aaa; }
        html[data-theme="dark"] .filter-select { background: #1e2030; border-color: #3a3d55; color: #e8e8ea; }

        /* ── 시험 카드 그리드 ── */
        .exam-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }
        .exam-card {
            background: rgba(255,255,255,0.95);
            border-radius: 18px;
            padding: 18px 22px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            backdrop-filter: blur(8px);
        }
        .exam-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px dashed rgba(102,126,234,0.25);
        }
        .exam-name {
            font-size: 1.05em;
            font-weight: 700;
            color: #333;
        }
        .exam-date {
            font-size: 0.82em;
            color: #888;
        }
        .exam-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.72em;
            font-weight: 600;
        }
        .exam-tag.pyeongga    { background: rgba(102,126,234,0.15); color: #667eea; }
        .exam-tag.gyoyukcheong { background: rgba(102,205,170,0.18); color: #2a9d7a; }
        .exam-tag.grade        { background: rgba(243,156,18,0.18); color: #d68910; }

        .subject-section {
            margin-bottom: 12px;
        }
        .subject-section:last-child { margin-bottom: 0; }
        .subject-section-title {
            font-size: 0.78em;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        .subject-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .subject-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(102,126,234,0.08);
            border: 1px solid rgba(102,126,234,0.18);
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 0.82em;
            color: #333;
        }
        .subject-chip-label { font-weight: 600; }
        .subject-chip a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.84em;
            padding: 2px 6px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .subject-chip a:hover { background: rgba(102,126,234,0.15); }
        .subject-chip-sep { color: #aaa; }

        html[data-theme="dark"] .exam-card     { background: rgba(30,32,48,0.92); }
        html[data-theme="dark"] .exam-name     { color: #e8e8ea; }
        html[data-theme="dark"] .exam-date     { color: #9a9aaa; }
        html[data-theme="dark"] .exam-card-header { border-bottom-color: rgba(154,165,234,0.2); }
        html[data-theme="dark"] .subject-chip  { background: rgba(154,165,234,0.1); border-color: rgba(154,165,234,0.2); color: #e8e8ea; }
        html[data-theme="dark"] .subject-chip a { color: #9aa5ea; }
        html[data-theme="dark"] .subject-chip a:hover { background: rgba(154,165,234,0.18); }
        html[data-theme="dark"] .subject-chip-sep { color: #555; }

        /* ── 상태 메시지 ── */
        .state-box {
            background: rgba(255,255,255,0.92);
            border-radius: 18px;
            padding: 50px 28px;
            text-align: center;
            color: #777;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            backdrop-filter: blur(8px);
        }
        .state-icon { font-size: 2.6em; margin-bottom: 12px; }
        .state-title { font-size: 1.1em; font-weight: 700; color: #555; margin-bottom: 6px; }
        .state-text { font-size: 0.9em; line-height: 1.6; color: #888; }
        html[data-theme="dark"] .state-box   { background: rgba(30,32,48,0.92); color: #9a9aaa; }
        html[data-theme="dark"] .state-title { color: #e8e8ea; }
        html[data-theme="dark"] .state-text  { color: #9a9aaa; }

        @media (max-width: 640px) {
            .container { padding: 0; }
            .page-header { padding: 20px 22px; border-radius: 18px; }
            .page-title { font-size: 1.3em; }
            .filter-bar { padding: 12px 14px; border-radius: 14px; }
            .exam-card { padding: 16px 18px; border-radius: 14px; }
        }
    </style>
</head>

    <script>
        // 시즌·다크 초기화
        initDarkTheme();
        setupNavMenu();
        setupDarkToggle('darkToggle');
        setupPaletteMenu('paletteBtn', 'paletteMenu');

        // 관리자 마킹 시 — placeholder 플래시 방지 (auth 확정 전 미리 표시)
        if (isAdminMarked()) {
            document.getElementById('placeholderBox').style.display = 'none';
            document.getElementById('adminUI').style.display = '';
            document.getElementById('draftBadge').style.display = '';
        }

        function applySeason() {
            const choice = getSeasonChoice();
            const resolved = resolveSeason(choice);
            if (resolved) document.documentElement.setAttribute('data-season', resolved);
            else          document.documentElement.removeAttribute('data-season');
            document.querySelectorAll('.theme-opt').forEach(b => b.classList.toggle('selected', b.dataset.season === choice));
        }
        applySeason();
        document.querySelectorAll('.theme-opt').forEach(b => b.addEventListener('click', () => {
            saveSeasonChoice(b.dataset.season);
            applySeason();
            document.getElementById('paletteMenu').classList.remove('open');
        }));
    </script>

    <script type="module">
        import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getFirestore, collection, getDocs, query, orderBy, limit }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey:            "AIzaSyAQjIqBSTukahMjOlW7kQyigqz9Y_Tzq_Q",
            authDomain:        "ksat-dday-bc76f.firebaseapp.com",
            projectId:         "ksat-dday-bc76f",
            storageBucket:     "ksat-dday-bc76f.firebasestorage.app",
            messagingSenderId: "291375667501",
            appId:             "1:291375667501:web:3def7360892dcfc3bf9ba4"
        };
        const app  = initializeApp(firebaseConfig);
        const db   = getFirestore(app);
        const auth = getAuth(app);

        // ── 과목 표시 순서/라벨 ─────────────────────────
        // 회차(subtype) → 시행 월. 수능 11월, 평가원 6·9월, 교육청 학평 3·5·7·10월 등
        const SUBTYPE_MONTH = {
            suneung: 11, '6mo': 6, '9mo': 9,
            '3wol': 3, '4wol': 4, '5wol': 5, '6wol': 6, '7wol': 7, '9wol': 9, '10wol': 10, '11wol': 11
        };

        const SUBJECT_GROUPS = [
            { key: 'korean',         label: '국어' },
            { key: 'math',           label: '수학' },
            { key: 'english',        label: '영어' },
            { key: 'korean-history', label: '한국사' },
            { key: 'social',         label: '사회탐구' },
            { key: 'science',        label: '과학탐구' },
            { key: 'vocational',     label: '직업탐구' },
            { key: 'second-lang',    label: '제2외국어/한문' }
        ];

        let allExams = [];

        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        // ── 인증 ────────────────────────────────────────
        signInAnonymously(auth).catch(e => console.error('auth error', e));

        onAuthStateChanged(auth, async (user) => {
            if (!user) return;

            const isAdmin = user.uid === ADMIN_UID;
            if (isAdmin) {
                markAdmin();
                applyArchiveNavVisibility();
                document.getElementById('placeholderBox').style.display = 'none';
                document.getElementById('adminUI').style.display = '';
                document.getElementById('draftBadge').style.display = '';
                await loadExams();
            } else {
                // 마킹이 잘못 남아있을 수 있으니 해제 + placeholder 복원
                unmarkAdmin();
                document.getElementById('placeholderBox').style.display = '';
                document.getElementById('adminUI').style.display = 'none';
                document.getElementById('draftBadge').style.display = 'none';
            }
        });

        async function loadExams() {
            try {
                const q    = query(collection(db, 'archive_exams'), orderBy('date', 'desc'), limit(100));
                const snap = await getDocs(q);
                allExams = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                buildYearFilter();
                renderGrid();
            } catch (e) {
                console.error('load exams error', e);
                document.getElementById('loadingBox').innerHTML =
                    '<div class="state-icon">⚠️</div><div class="state-text">로드 실패: ' + escapeHtml(e.message) + '</div>';
            }
        }

        function buildYearFilter() {
            const years = [...new Set(allExams.map(e => e.year))].sort((a, b) => b - a);
            const sel = document.getElementById('filterYear');
            // 값은 학년도(데이터 그대로), 라벨은 시행연도(학년도-1)
            sel.innerHTML = '<option value="">전체</option>' +
                years.map(y => `<option value="${y}">${y - 1}년</option>`).join('');
        }

        function renderGrid() {
            const fy = document.getElementById('filterYear').value;
            const fm = document.getElementById('filterMonth').value;
            const fg = document.getElementById('filterGrade').value;

            const filtered = allExams.filter(e => {
                if (fy && String(e.year) !== fy)      return false;
                if (fm && String(SUBTYPE_MONTH[e.subtype] || '') !== fm) return false;
                if (fg && String(e.grade || '') !== fg) return false;
                return true;
            });

            const grid = document.getElementById('examGrid');
            document.getElementById('loadingBox').style.display = 'none';

            if (filtered.length === 0) {
                grid.innerHTML = '';
                document.getElementById('emptyBox').style.display = '';
                return;
            }

            document.getElementById('emptyBox').style.display = 'none';
            grid.innerHTML = filtered.map(renderExamCard).join('');
        }

        function renderExamCard(exam) {
            // Worker가 ?dl=1이면 강제 다운로드(attachment). 파일은 R2 도메인이라
            // HTML download 속성은 안 먹어서 쿼리로 처리한다.
            const dl = u => u + (u.indexOf('?') >= 0 ? '&' : '?') + 'dl=1';
            const typeLabel = exam.subtype === 'suneung' ? '수능' :
                              exam.type === 'pyeongga' ? '평가원' :
                              exam.type === 'gyoyukcheong' ? '교육청' : exam.type;
            const gradeLabel = exam.grade ? `고${exam.grade}` : '';
            const month = SUBTYPE_MONTH[exam.subtype];
            const examName = (exam.year && month) ? `${exam.year - 1}년 ${month}월` : (exam.label || exam.id);

            const sections = SUBJECT_GROUPS.map(g => {
                const grp = exam.files?.[g.key];
                if (!grp) return '';

                let rows = '';
                // 'english' 같이 시험지/듣기 케이스도 같은 구조로 처리
                if (typeof grp === 'string') {
                    // 단일 URL (예: korean-history 직접 URL)
                    rows = `<span class="subject-chip">
                        <span class="subject-chip-label">${escapeHtml(g.label)}</span>
                        <span class="subject-chip-sep">·</span>
                        <a href="${escapeHtml(dl(grp))}" rel="noopener">다운로드</a>
                    </span>`;
                } else if (grp && typeof grp === 'object') {
                    rows = Object.entries(grp).map(([subjName, entry]) => {
                        const links = [];
                        if (typeof entry === 'string') {
                            links.push(`<a href="${escapeHtml(dl(entry))}" rel="noopener">다운로드</a>`);
                        } else if (entry && typeof entry === 'object') {
                            if (entry['문제'])  links.push(`<a href="${escapeHtml(dl(entry['문제']))}"  rel="noopener">문제지</a>`);
                            if (entry['정답'])  links.push(`<a href="${escapeHtml(dl(entry['정답']))}"  rel="noopener">정답</a>`);
                            if (entry['해설'])  links.push(`<a href="${escapeHtml(dl(entry['해설']))}"  rel="noopener">해설</a>`);
                            if (entry['듣기'])  links.push(`<a href="${escapeHtml(entry['듣기'])}"  target="_blank" rel="noopener">듣기</a>`);
                            if (entry['url'])   links.push(`<a href="${escapeHtml(dl(entry['url']))}"   rel="noopener">다운로드</a>`);
                        }
                        if (links.length === 0) return '';
                        return `<span class="subject-chip">
                            <span class="subject-chip-label">${escapeHtml(subjName)}</span>
                            <span class="subject-chip-sep">·</span>
                            ${links.join('<span class="subject-chip-sep">·</span>')}
                        </span>`;
                    }).join('');
                }
                if (!rows) return '';
                return `<div class="subject-section">
                    <div class="subject-section-title">${escapeHtml(g.label)}</div>
                    <div class="subject-row">${rows}</div>
                </div>`;
            }).join('');

            return `<article class="exam-card">
                <div class="exam-card-header">
                    <span class="exam-name">${escapeHtml(examName)}</span>
                    <span class="exam-tag ${escapeHtml(exam.type || '')}">${escapeHtml(typeLabel)}</span>
                    ${gradeLabel ? `<span class="exam-tag grade">${escapeHtml(gradeLabel)}</span>` : ''}
                    ${exam.date ? `<span class="exam-date">${escapeHtml(exam.date)}</span>` : ''}
                </div>
                ${sections || '<div class="state-text">등록된 파일이 없습니다.</div>'}
            </article>`;
        }

        // 필터 이벤트
        ['filterYear', 'filterMonth', 'filterGrade'].forEach(id => {
            document.getElementById(id).addEventListener('change', renderGrid);
        });
    </script>
</body>
</html>
